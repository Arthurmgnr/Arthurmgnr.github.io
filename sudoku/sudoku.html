<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sudoku.css">
    <title>Mon Site Web</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="start center">
        <button class="bouton start" onclick="start()">START</button>
        <div class="joueur">
            <label for="joueur">Qui joue ?</label>
            <input id="joueur" type="text">
        </div>
    </div>

    <div class="content center">
        <div class="entete">
            <div class="entete-elt">
                <span class="entete-titre">Erreurs</span>
                <span class="entete-contenu"><span class="erreurs">0</span>/3</span>
            </div>

            <div class="entete-temps">
                <div class="entete-elt">
                    <span class="entete-titre">Temps</span>
                    <span class="entete-contenu"><span class="compteur">00:00</span></span>
                </div>
                <div class="entete-temps-icon pause" onclick="pause()">
                    <span class="material-symbols-outlined">pause_circle</span>
                </div>
                <div class="entete-temps-icon play" onclick="pause()">
                    <span class="material-symbols-outlined">play_circle</span>
                </div>
            </div>
        </div>

        <table class="sudoku">
            <tr>
                <td ligne="0" colonne="0" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="0" colonne="1" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="0" colonne="2" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="0" colonne="3" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="0" colonne="4" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="0" colonne="5" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="0" colonne="6" carre="2" onclick="clickedCase(this)"></td>
                <td ligne="0" colonne="7" carre="2" onclick="clickedCase(this)"></td>
                <td ligne="0" colonne="8" carre="2" onclick="clickedCase(this)"></td>
            </tr>
            <tr>
                <td ligne="1" colonne="0" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="1" colonne="1" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="1" colonne="2" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="1" colonne="3" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="1" colonne="4" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="1" colonne="5" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="1" colonne="6" carre="2" onclick="clickedCase(this)"></td>
                <td ligne="1" colonne="7" carre="2" onclick="clickedCase(this)"></td>
                <td ligne="1" colonne="8" carre="2" onclick="clickedCase(this)"></td>
            </tr>
            <tr>
                <td ligne="2" colonne="0" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="2" colonne="1" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="2" colonne="2" carre="0" onclick="clickedCase(this)"></td>
                <td ligne="2" colonne="3" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="2" colonne="4" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="2" colonne="5" carre="1" onclick="clickedCase(this)"></td>
                <td ligne="2" colonne="6" carre="2" onclick="clickedCase(this)"></td>
                <td ligne="2" colonne="7" carre="2" onclick="clickedCase(this)"></td>
                <td ligne="2" colonne="8" carre="2" onclick="clickedCase(this)"></td>
            </tr>
            <tr>
                <td ligne="3" colonne="0" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="3" colonne="1" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="3" colonne="2" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="3" colonne="3" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="3" colonne="4" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="3" colonne="5" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="3" colonne="6" carre="5" onclick="clickedCase(this)"></td>
                <td ligne="3" colonne="7" carre="5" onclick="clickedCase(this)"></td>
                <td ligne="3" colonne="8" carre="5" onclick="clickedCase(this)"></td>
            </tr>
            <tr>
                <td ligne="4" colonne="0" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="4" colonne="1" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="4" colonne="2" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="4" colonne="3" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="4" colonne="4" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="4" colonne="5" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="4" colonne="6" carre="5" onclick="clickedCase(this)"></td>
                <td ligne="4" colonne="7" carre="5" onclick="clickedCase(this)"></td>
                <td ligne="4" colonne="8" carre="5" onclick="clickedCase(this)"></td>
            </tr>
            <tr>
                <td ligne="5" colonne="0" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="5" colonne="1" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="5" colonne="2" carre="3" onclick="clickedCase(this)"></td>
                <td ligne="5" colonne="3" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="5" colonne="4" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="5" colonne="5" carre="4" onclick="clickedCase(this)"></td>
                <td ligne="5" colonne="6" carre="5" onclick="clickedCase(this)"></td>
                <td ligne="5" colonne="7" carre="5" onclick="clickedCase(this)"></td>
                <td ligne="5" colonne="8" carre="5" onclick="clickedCase(this)"></td>
            </tr>
            <tr>
                <td ligne="6" colonne="0" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="6" colonne="1" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="6" colonne="2" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="6" colonne="3" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="6" colonne="4" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="6" colonne="5" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="6" colonne="6" carre="8" onclick="clickedCase(this)"></td>
                <td ligne="6" colonne="7" carre="8" onclick="clickedCase(this)"></td>
                <td ligne="6" colonne="8" carre="8" onclick="clickedCase(this)"></td>
            </tr>
            <tr>
                <td ligne="7" colonne="0" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="7" colonne="1" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="7" colonne="2" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="7" colonne="3" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="7" colonne="4" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="7" colonne="5" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="7" colonne="6" carre="8" onclick="clickedCase(this)"></td>
                <td ligne="7" colonne="7" carre="8" onclick="clickedCase(this)"></td>
                <td ligne="7" colonne="8" carre="8" onclick="clickedCase(this)"></td>
            </tr>
            <tr>
                <td ligne="8" colonne="0" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="8" colonne="1" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="8" colonne="2" carre="6" onclick="clickedCase(this)"></td>
                <td ligne="8" colonne="3" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="8" colonne="4" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="8" colonne="5" carre="7" onclick="clickedCase(this)"></td>
                <td ligne="8" colonne="6" carre="8" onclick="clickedCase(this)"></td>
                <td ligne="8" colonne="7" carre="8" onclick="clickedCase(this)"></td>
                <td ligne="8" colonne="8" carre="8" onclick="clickedCase(this)"></td>
            </tr>
        </table>

        <div class="button-container">
            <button class="button-digit" onclick="ecrireChiffre('1')">1</button>
            <button class="button-digit" onclick="ecrireChiffre('2')">2</button>
            <button class="button-digit" onclick="ecrireChiffre('3')">3</button>
            <button class="button-digit" onclick="ecrireChiffre('4')">4</button>
            <button class="button-digit" onclick="ecrireChiffre('5')">5</button>
            <button class="button-digit" onclick="ecrireChiffre('6')">6</button>
            <button class="button-digit" onclick="ecrireChiffre('7')">7</button>
            <button class="button-digit" onclick="ecrireChiffre('8')">8</button>
            <button class="button-digit" onclick="ecrireChiffre('9')">9</button>
        </div>
    </div>

    <div class="alert-container perdu">
        <div class="alert-content center">
            <h1>Dommage, tu as perdu !</h1>

            <p>Voici ton gage :</p>
            <p class="span-gage-perdu"></p>
            <p>Tu peux à présent attendre que <span class="autre-joueur-perdu"></span> termine !</p>

            <div class="bouton" onclick="restart()">RESTART</div>
        </div>
    </div>

    <div class="alert-container gagne">
        <div class="alert-content center">
            <h1>Bravo, tu as gagne !</h1>

            <p>
                Temps : <span class="temps-final"></span> &#8658; <span class="nb-vetements"></span> <span class="span-vetements"></span>
            </p>
            <p>
                Erreurs : <span class="nb-erreurs-1"></span> &#8658; <span class="nb-erreurs-2"></span> <span class="span-gage-gagne"></span> :
            </p>
            <p class="p-gages"></p>
            <ul class="ul-gages"></ul>
            <p>Tu peux à présent t'habiller et attendre que <span class="autre-joueur-gagne"></span> termine !</p>

            <div class="bouton" onclick="restart()">RESTART</div>
        </div>
    </div>

    <script
        type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">

    <script src="sudoku.js"></script>
</body>
</html>
